<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapChef - Payment Successful!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 30px; line-height: 1.5; }
        .features {
            text-align: left;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            font-size: 15px;
        }
        .feature:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .check { font-size: 20px; }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: white;
            color: #6366f1;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .countdown { font-size: 13px; opacity: 0.7; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎉</div>
        <h1>Welcome to Premium!</h1>
        <p>Your payment was successful. Enjoy unlimited access to all SnapChef features!</p>
        
        <div class="features">
            <div class="feature"><span class="check">✅</span> Unlimited recipe generations</div>
            <div class="feature"><span class="check">✅</span> No advertisements</div>
            <div class="feature"><span class="check">✅</span> Priority AI processing</div>
            <div class="feature"><span class="check">✅</span> Full meal planning</div>
            <div class="feature"><span class="check">✅</span> Offline saved recipes</div>
        </div>

        <a class="btn" href="/" id="continueBtn">Open SnapChef 🍳</a>
        <div class="countdown" id="countdown">Redirecting in 5 seconds...</div>
    </div>

    <script>
        // Activate premium
        var params = new URLSearchParams(window.location.search);
        var plan = params.get('plan') || 'monthly';
        var sessionId = params.get('session_id');

        // Set premium in localStorage
        localStorage.setItem('snapchef_premium', '1');
        localStorage.setItem('snapchef_premium_plan', plan);
        localStorage.setItem('snapchef_premium_date', Date.now().toString());
        if (sessionId) {
            localStorage.setItem('snapchef_stripe_session', sessionId);
        }

        // Auto redirect after 5 seconds
        var count = 5;
        var timer = setInterval(function() {
            count--;
            document.getElementById('countdown').textContent = 'Redirecting in ' + count + ' seconds...';
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
